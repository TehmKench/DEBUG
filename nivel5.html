<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DEBUG - FINAL BOSS HUNT</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-effects@master/dist/aframe-effects.min.js"></script>
<script src="js/hotbar.js"></script>

<style>
body { margin:0; overflow:hidden; cursor:none; font-family: 'Courier New', monospace; }
#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1000;
}
#boss-health-container {
  position: absolute; top: 30px; left: 50%;
  transform: translateX(-50%);
  width: 600px;
}
#boss-health-label {
  color: #ff0044; font-size: 24px; text-align: center;
  text-shadow: 0 0 20px #ff0044; margin-bottom: 10px;
}
#boss-health-bar {
  width: 100%; height: 40px;
  background: rgba(0,0,0,0.9);
  border: 4px solid #ff0044;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 30px #ff0044;
}
#boss-health-fill {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #ff0044, #ff6600, #ffcc00);
  transition: width 0.3s;
}
#player-health-container {
  position: absolute; bottom: 40px; left: 40px;
  width: 300px;
}
#player-health-label {
  color: #00ffff; font-size: 20px; margin-bottom: 8px;
  text-shadow: 0 0 15px #00ffff;
}
#player-health-bar {
  width: 100%; height: 25px;
  background: rgba(0,0,0,0.9);
  border: 3px solid #00ffff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 20px #00ffff;
}
#player-health-fill {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #00ffff, #00ff88);
  transition: width 0.2s;
}
#radar {
  position: absolute; bottom: 40px; right: 40px;
  width: 200px; height: 200px;
  background: rgba(0,0,0,0.85);
  border: 4px solid #ff6600;
  border-radius: 50%;
  box-shadow: 0 0 25px #ff6600;
}
#radar-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  background: #00ffff;
  border-radius: 50%;
  box-shadow: 0 0 15px #00ffff;
}
.radar-orb {
  position: absolute;
  width: 12px; height: 12px;
  background: #ffff00;
  border-radius: 50%;
  box-shadow: 0 0 15px #ffff00;
  transform: translate(-50%, -50%);
}
#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  border: 2px solid #00ffff;
  border-radius: 50%;
}
#controls {
  position: absolute; bottom: 10px; left: 50%;
  transform: translateX(-50%);
  color: #ffff00; font-size: 18px; text-align: center;
  text-shadow: 0 0 15px #ffff00;
  font-weight: bold;
  letter-spacing: 2px;
}
#victory-screen, #gameover-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center; align-items: center;
  flex-direction: column;
  z-index: 2000;
}
#victory-screen h1 { color: #00ff88; font-size: 72px; text-shadow: 0 0 60px #00ff88; }
#gameover-screen h1 { color: #ff0044; font-size: 72px; text-shadow: 0 0 60px #ff0044; }
#victory-screen p, #gameover-screen p { color: #fff; font-size: 24px; margin-top: 30px; }
#damage-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(circle, transparent 40%, rgba(255,0,0,0.6) 100%);
  opacity: 0; pointer-events: none; z-index: 999;
}
#orb-counter {
  position: absolute; top: 100px; left: 50%;
  transform: translateX(-50%);
  color: #ffff00; font-size: 28px;
  text-shadow: 0 0 20px #ffff00;
}
#phase-indicator {
  position: absolute; top: 150px; left: 50%;
  transform: translateX(-50%);
  color: #ff0044; font-size: 20px;
  text-shadow: 0 0 15px #ff0044;
}
#screen-shake { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; }
.shake { animation: shake 0.5s ease-in-out; }
@keyframes shake {
  0%,100% { transform: translate(0,0); }
  10%,30%,50%,70%,90% { transform: translate(-10px,-10px); }
  20%,40%,60%,80% { transform: translate(10px,10px); }
}
#final-beam {
  position: fixed; top: 100%; left: 50%; transform: translateX(-50%);
  width: 150px; height: 0;
  background: linear-gradient(to top, #ffff00, #ffffff, #87ceeb);
  opacity: 0; pointer-events: none; z-index: 10000;
  box-shadow: 0 0 100px #ffff00, 0 0 200px #ffffff;
}
#sky-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: transparent; opacity: 0; pointer-events: none; z-index: 9998;
  transition: background 3s, opacity 2s;
}
#invincibility-indicator {
  position: fixed; top:50%; left:50%; transform: translate(-50%,-50%);
  color: #00ffff; font-size: 32px; text-shadow: 0 0 20px #00ffff;
  opacity: 0; pointer-events: none; z-index: 1000;
  animation: pulse 0.3s infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
</style>
</head>

<body>

<div id="screen-shake"></div>
<div id="final-beam"></div>
<div id="sky-overlay"></div>
<div id="invincibility-indicator"></div>

<div id="ui">
  <div id="boss-health-container">
    <div id="boss-health-label">VOID CORE BOSS</div>
    <div id="boss-health-bar"><div id="boss-health-fill"></div></div>
  </div>
  <div id="orb-counter">ORBS: 0/3</div>
  <div id="phase-indicator">FASE 1</div>
  <div id="player-health-container">
    <div id="player-health-label">HEALTH</div>
    <div id="player-health-bar"><div id="player-health-fill"></div></div>
  </div>
  <div id="radar"><div id="radar-center"></div></div>
  <div id="crosshair"></div>
  <div id="controls">RECOLECTA LOS 3 ORBES</div>
</div>

<div id="damage-overlay"></div>

<div id="victory-screen">
  <h1> CORE DESTROYED </h1>
  <p>El vacío ha sido conquistado</p>
</div>

<div id="gameover-screen">
  <h1> ELIMINATED </h1>
  <p>Regresando al lobby...</p>
</div>

<a-scene id="scene"
         background="color:#000000"
         fog="type: exponential; color: #000000; density: 0.001"
         effects="bloom:true; bloomStrength:3; bloomRadius:1.5; bloomThreshold:0.1"
         renderer="antialias: true; colorManagement: true;">

  <a-assets>
    <a-asset-item id="coreModel" src="assets/boss_core.glb"></a-asset-item>
    <audio id="music" src="assets/music.mp3" crossorigin="anonymous"></audio>
  </a-assets>

  <a-entity id="terrain"></a-entity>

  <a-entity id="boss" position="0 30 0">
    <a-entity id="boss-model" gltf-model="#coreModel" scale="30 30 30"></a-entity>
    <a-light type="point" intensity="15" color="#ff0044" distance="300"></a-light>
  </a-entity>

  <a-entity id="player" position="0 5 900">
    <a-entity id="camera" camera="fov: 100" look-controls="pointerLockEnabled: true"></a-entity>
  </a-entity>

  <a-entity id="orbs-container"></a-entity>
  <a-entity id="lightning-container"></a-entity>

  <a-light type="ambient" intensity="0.2" color="#0a0000"></a-light>
  <a-light type="point" position="0 100 0" intensity="1" color="#ff0044" distance="200"></a-light>

</a-scene>

<script>
const CHUNK_SIZE = 200, SEGMENTS = 12, DUNE_HEIGHT = 25, RENDER_DISTANCE = 4, MAP_SIZE = 2000;

const terrainEl       = document.getElementById('terrain');
const playerEl        = document.getElementById('player');
const cameraEl        = document.getElementById('camera');
const sceneEl         = document.getElementById('scene');
const bossEl          = document.getElementById('boss');
const orbsContainer   = document.getElementById('orbs-container');
const screenShakeEl   = document.getElementById('screen-shake');
const finalBeamEl     = document.getElementById('final-beam');
const skyOverlayEl    = document.getElementById('sky-overlay');
const invincibilityEl = document.getElementById('invincibility-indicator');
const lightningContainer = document.getElementById('lightning-container');

const playerObj = playerEl.object3D;
const cameraObj = cameraEl.object3D;
const bossObj   = bossEl.object3D;

let playerHealth = 100, bossHealth = 100, orbsCollected = 0;
let gameActive = true, bossPhase = 1;
let playerVel = new THREE.Vector3(0,0,0), onGround = false, canDash = true;
let isInvincible = false, invincibilityEndTime = 0;
const keys = {};
let orbs = [], projectiles = [], circularFireRotation = 0;
let chunks = {}, lastChunkX = 0, lastChunkZ = 0, chunkQueue = [], isGeneratingChunks = false;
let lastShotTime = 0, shotInterval = 800;

/* ── INMORTALIDAD INICIAL ────────────────────────────── */
function activateInvincibility() {
  isInvincible = true;
  invincibilityEndTime = Date.now() + 1500;
  invincibilityEl.style.opacity = '1';
  const chk = setInterval(() => {
    if (Date.now() > invincibilityEndTime) {
      isInvincible = false;
      invincibilityEl.style.opacity = '0';
      clearInterval(chk);
    }
  }, 100);
}

/* ── TERRENO ─────────────────────────────────────────── */
function noise(x,z) {
  return (Math.sin(x*0.02)*Math.cos(z*0.02)*0.5 + Math.sin(x*0.05+1.5)*Math.cos(z*0.04+1.5)*0.3) * DUNE_HEIGHT;
}
function createChunk(cx,cz) {
  const key=`${cx},${cz}`; if(chunks[key]) return;
  const chunk=document.createElement('a-entity');
  chunk.setAttribute('position',`${cx*CHUNK_SIZE} 0 ${cz*CHUNK_SIZE}`);
  for(let i=0;i<=SEGMENTS;i++){
    const pts=[]; for(let j=0;j<=SEGMENTS;j++){const x=(j/SEGMENTS-.5)*CHUNK_SIZE,z=(i/SEGMENTS-.5)*CHUNK_SIZE,y=noise(cx*CHUNK_SIZE+x,cz*CHUNK_SIZE+z); pts.push(`${x} ${y} ${z}`);}
    const l=document.createElement('a-entity'); l.setAttribute('line',{color:'#ff0044',opacity:0.8,width:3,path:pts.join(' ')}); chunk.appendChild(l);
  }
  for(let j=0;j<=SEGMENTS;j++){
    const pts=[]; for(let i=0;i<=SEGMENTS;i++){const x=(j/SEGMENTS-.5)*CHUNK_SIZE,z=(i/SEGMENTS-.5)*CHUNK_SIZE,y=noise(cx*CHUNK_SIZE+x,cz*CHUNK_SIZE+z); pts.push(`${x} ${y} ${z}`);}
    const l=document.createElement('a-entity'); l.setAttribute('line',{color:'#ff3366',opacity:0.8,width:3,path:pts.join(' ')}); chunk.appendChild(l);
  }
  terrainEl.appendChild(chunk); chunks[key]=chunk;
}
function processChunkQueue() {
  if(!chunkQueue.length){isGeneratingChunks=false;return;}
  chunkQueue.splice(0,2).forEach(({cx,cz})=>createChunk(cx,cz));
  isGeneratingChunks=true; requestAnimationFrame(processChunkQueue);
}
function updateTerrain() {
  const cx=Math.round(playerObj.position.x/CHUNK_SIZE), cz=Math.round(playerObj.position.z/CHUNK_SIZE);
  if(cx===lastChunkX&&cz===lastChunkZ) return;
  lastChunkX=cx; lastChunkZ=cz;
  for(const key in chunks){const[kx,kz]=key.split(',').map(Number); if(Math.sqrt((kx-cx)**2+(kz-cz)**2)>RENDER_DISTANCE+1){chunks[key].remove();delete chunks[key];}}
  for(let dx=-RENDER_DISTANCE;dx<=RENDER_DISTANCE;dx++) for(let dz=-RENDER_DISTANCE;dz<=RENDER_DISTANCE;dz++){const key=`${cx+dx},${cz+dz}`;if(!chunks[key])chunkQueue.push({cx:cx+dx,cz:cz+dz});}
  if(!isGeneratingChunks&&chunkQueue.length) processChunkQueue();
}

/* ── ORBES ───────────────────────────────────────────── */
function spawnOrbs() {
  orbs=[];
  [{x:800,z:800},{x:-800,z:800},{x:0,z:-850}].forEach((pos,i)=>{
    const orb=document.createElement('a-entity'); orb.setAttribute('position',`${pos.x} 5 ${pos.z}`);
    const sp=document.createElement('a-sphere'); sp.setAttribute('radius','6'); sp.setAttribute('color','#ffff00'); sp.setAttribute('emissive','#ffff00'); sp.setAttribute('emissive-intensity','5'); sp.setAttribute('animation','property:scale;to:1.2 1.2 1.2;dur:800;loop:true;dir:alternate'); orb.appendChild(sp);
    const ring=document.createElement('a-torus'); ring.setAttribute('radius','8'); ring.setAttribute('radius-tubular','0.6'); ring.setAttribute('color','#ffffff'); ring.setAttribute('emissive','#ffffff'); ring.setAttribute('emissive-intensity','3'); ring.setAttribute('rotation','90 0 0'); ring.setAttribute('animation','property:rotation;to:90 360 0;dur:5000;loop:true;easing:linear'); orb.appendChild(ring);
    const light=document.createElement('a-light'); light.setAttribute('type','point'); light.setAttribute('intensity','4'); light.setAttribute('color','#ffff00'); light.setAttribute('distance','70'); orb.appendChild(light);
    orbsContainer.appendChild(orb); orbs.push({el:orb,x:pos.x,y:5,z:pos.z,collected:false,index:i});
  });
}
function updateRadar() {
  const radar=document.getElementById('radar'); const rs=200,rr=MAP_SIZE/2;
  radar.querySelectorAll('.radar-orb').forEach(e=>e.remove());
  const pp=playerObj.position;
  orbs.forEach(orb=>{
    if(orb.collected) return;
    const dot=document.createElement('div'); dot.className='radar-orb';
    dot.style.left=((orb.x-pp.x)/rr*(rs/2)+rs/2)+'px';
    dot.style.top= ((orb.z-pp.z)/rr*(rs/2)+rs/2)+'px';
    radar.appendChild(dot);
  });
}

/* ── AUDIO ───────────────────────────────────────────── */
function initAudio() {
  const audio=document.getElementById('music');
  const ac=new (window.AudioContext||window.webkitAudioContext)();
  const an=ac.createAnalyser(); const src=ac.createMediaElementSource(audio);
  src.connect(an); an.connect(ac.destination);
  window.addEventListener('click',()=>{ac.resume();audio.play();audio.loop=true;},{once:true});
}

/* ── CONTROLES ───────────────────────────────────────── */
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'&&onGround){playerVel.y=1.5;onGround=false;}
  if(e.code==='ShiftLeft'&&canDash){
    canDash=false;
    const dir=new THREE.Vector3(); cameraObj.getWorldDirection(dir); dir.y=0;dir.normalize();dir.negate();
    playerVel.add(dir.multiplyScalar(3));
    setTimeout(()=>canDash=true,600);
  }
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

/* ── MOVIMIENTO ──────────────────────────────────────── */
function updatePlayer() {
  if(!cameraObj||!gameActive) return;
  const camDir=new THREE.Vector3(); cameraObj.getWorldDirection(camDir); camDir.y=0;camDir.normalize();camDir.negate();
  const camRight=new THREE.Vector3(); camRight.crossVectors(camDir,new THREE.Vector3(0,1,0)).normalize();
  const inputDir=new THREE.Vector3();
  if(keys['KeyW'])inputDir.add(camDir); if(keys['KeyS'])inputDir.sub(camDir);
  if(keys['KeyD'])inputDir.add(camRight); if(keys['KeyA'])inputDir.sub(camRight);
  const speed=2.5;
  if(inputDir.length()>0){inputDir.normalize();playerVel.x=inputDir.x*speed;playerVel.z=inputDir.z*speed;}
  else{playerVel.x*=0.9;playerVel.z*=0.9;}
  if(!onGround) playerVel.y-=0.05;
  const pos=playerObj.position.clone(); pos.x+=playerVel.x;pos.z+=playerVel.z;pos.y+=playerVel.y;
  const th=noise(pos.x,pos.z);
  if(pos.y<th+4){pos.y=th+4;playerVel.y=0;onGround=true;}
  const lim=MAP_SIZE/2-20; pos.x=Math.max(-lim,Math.min(lim,pos.x)); pos.z=Math.max(-lim,Math.min(lim,pos.z));
  playerObj.position.copy(pos);
}

/* ── BOSS ────────────────────────────────────────────── */
function updateBoss() {
  if(!gameActive) return;
  const bPos=bossObj.position.clone(), pPos=playerObj.position.clone();
  const dir=new THREE.Vector3(); dir.subVectors(pPos,bPos);
  bossObj.rotation.y=Math.atan2(dir.x,dir.z)-Math.PI/2;
  if(bossHealth<=67&&bossPhase===1){bossPhase=2;shotInterval=500;document.getElementById('phase-indicator').textContent='FASE 2';}
  if(bossHealth<=34&&bossPhase===2){bossPhase=3;shotInterval=250;document.getElementById('phase-indicator').textContent='FASE 3 - DESTRUCCIÓN';}
  if(bossPhase<=2){
    const now=Date.now();
    if(now-lastShotTime>shotInterval){
      fireProjectile(0);fireProjectile(-0.3);fireProjectile(0.3);
      if(bossPhase===2){fireProjectile(-0.5);fireProjectile(0.5);}
      lastShotTime=now;
    }
  }
  if(bossPhase===3){
    const now=Date.now();
    if(now-lastShotTime>shotInterval){
      if(Math.random()<0.5) fireLightning();
      circularFireRotation+=0.4;
      for(let i=0;i<12;i++) fireProjectileCircular((i/12)*Math.PI*2+circularFireRotation);
      lastShotTime=now;
    }
  }
}

/* ── PROYECTILES ─────────────────────────────────────── */
function fireProjectile(offsetX=0) {
  const p=document.createElement('a-sphere'); p.setAttribute('radius','2'); p.setAttribute('color','#ff0044'); p.setAttribute('emissive','#ff0044'); p.setAttribute('emissive-intensity','5'); p.setAttribute('position',`${bossObj.position.x} 5 ${bossObj.position.z}`); sceneEl.appendChild(p);
  const dir=new THREE.Vector3(); dir.subVectors(playerObj.position,bossObj.position).normalize(); dir.y=0;dir.x+=offsetX;dir.normalize();
  projectiles.push({el:p,pos:p.object3D.position.clone(),dir,speed:5,active:true,maxDist:3000});
}
function fireProjectileCircular(angle) {
  const p=document.createElement('a-sphere'); p.setAttribute('radius','2'); p.setAttribute('color','#ff0044'); p.setAttribute('emissive','#ff0044'); p.setAttribute('emissive-intensity','5'); p.setAttribute('position',`${bossObj.position.x} 5 ${bossObj.position.z}`); sceneEl.appendChild(p);
  projectiles.push({el:p,pos:p.object3D.position.clone(),dir:new THREE.Vector3(Math.sin(angle),0,Math.cos(angle)),speed:4,active:true,maxDist:3000});
}
function updateProjectiles() {
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i]; if(!p.active) continue;
    p.pos.add(p.dir.clone().multiplyScalar(p.speed)); p.el.object3D.position.copy(p.pos);
    const dx=p.pos.x-playerObj.position.x, dz=p.pos.z-playerObj.position.z;
    if(Math.sqrt(dx*dx+dz*dz)<5&&!isInvincible){damagePlayer(15);p.el.remove();p.active=false;projectiles.splice(i,1);continue;}
    if(p.pos.length()>p.maxDist){p.el.remove();p.active=false;projectiles.splice(i,1);}
  }
}

/* ── RAYOS ───────────────────────────────────────────── */
function fireLightning() {
  const bPos=bossObj.position.clone(), pPos=playerObj.position.clone();
  const start=new THREE.Vector3(bPos.x,5,bPos.z);
  const dir=new THREE.Vector3(); dir.subVectors(pPos,start).normalize();
  dir.x+=(Math.random()-.5)*.3;dir.z+=(Math.random()-.5)*.3;dir.normalize();
  const end=start.clone().add(dir.clone().multiplyScalar(3000));
  createWarningLine3D(start,end,dir);
  setTimeout(()=>{ if(!gameActive) return; createLightningBeam(start,end,dir); },2000);
}
function createWarningLine3D(start,end,dir) {
  const w=document.createElement('a-cylinder'); w.setAttribute('position',`${start.x} ${start.y} ${start.z}`); w.setAttribute('radius','4'); w.setAttribute('height','3000'); w.setAttribute('color','#ff0000'); w.setAttribute('opacity','0.5'); w.setAttribute('transparent','true'); w.setAttribute('emissive','#ff0000'); w.setAttribute('emissive-intensity','3'); w.setAttribute('rotation',`90 ${Math.atan2(dir.x,dir.z)*180/Math.PI} 0`); w.setAttribute('animation','property:opacity;from:0.3;to:0.8;dur:150;loop:true;dir:alternate'); lightningContainer.appendChild(w); setTimeout(()=>w.remove(),2100);
}
function createLightningBeam(start,end,dir) {
  const b=document.createElement('a-cylinder'); b.setAttribute('position',`${start.x} ${start.y} ${start.z}`); b.setAttribute('radius','8'); b.setAttribute('height','3000'); b.setAttribute('color','#ff0044'); b.setAttribute('emissive','#ff0044'); b.setAttribute('emissive-intensity','20'); b.setAttribute('rotation',`90 ${Math.atan2(dir.x,dir.z)*180/Math.PI} 0`); lightningContainer.appendChild(b);
  if(distanceToLineXZ(playerObj.position.clone(),start,end)<10&&!isInvincible) damagePlayer(40);
  setTimeout(()=>b.remove(),1500);
}
function distanceToLineXZ(point,lineStart,lineEnd) {
  const ld=new THREE.Vector3(); ld.subVectors(lineEnd,lineStart);ld.y=0;ld.normalize();
  const pd=new THREE.Vector3(); pd.subVectors(point,lineStart);pd.y=0;
  return point.distanceTo(lineStart.clone().add(ld.multiplyScalar(pd.dot(ld))));
}

/* ── ORBES UPDATE ────────────────────────────────────── */
function updateOrbs() {
  if(!gameActive) return;
  const pp=playerObj.position;
  orbs.forEach(orb=>{
    if(orb.collected) return;
    const dx=pp.x-orb.x,dz=pp.z-orb.z;
    if(Math.sqrt(dx*dx+dz*dz)<15){
      orb.collected=true; orb.el.setAttribute('visible','false'); orbsCollected++;
      const isLast=orbsCollected>=3; sendOrbToBoss(orb.x,orb.y,orb.z,isLast); damageBoss(33.33);
      document.getElementById('orb-counter').textContent=`ORBS: ${orbsCollected}/3`; triggerScreenShake();
    }
  });
}
function sendOrbToBoss(ox,oy,oz,isLast) {
  const op=document.createElement('a-sphere'); op.setAttribute('radius','5'); op.setAttribute('color','#ffff00'); op.setAttribute('emissive','#ffff00'); op.setAttribute('emissive-intensity','6'); op.setAttribute('position',`${ox} ${oy} ${oz}`); sceneEl.appendChild(op);
  const bPos=bossObj.position.clone(),dir=new THREE.Vector3(); dir.subVectors(bPos,op.object3D.position).normalize();
  let pos=op.object3D.position.clone();
  const mv=setInterval(()=>{
    if(!gameActive){op.remove();clearInterval(mv);return;}
    pos.add(dir.clone().multiplyScalar(6)); op.object3D.position.copy(pos);
    if(pos.distanceTo(bPos)<30){createOrbExplosion(pos.clone(),isLast);op.remove();clearInterval(mv);}
  },16);
}
function createOrbExplosion(pos,isLast) {
  const cnt=isLast?200:80,sz=isLast?4:2;
  for(let i=0;i<cnt;i++){
    const p=document.createElement('a-sphere'); p.setAttribute('radius',Math.random()*sz+1);
    const cols=['#ffff00','#ff6600','#ffffff','#ff0044']; p.setAttribute('color',cols[Math.floor(Math.random()*4)]); p.setAttribute('emissive',p.getAttribute('color')); p.setAttribute('emissive-intensity','5'); p.setAttribute('position',pos); sceneEl.appendChild(p);
    const vel=new THREE.Vector3((Math.random()-.5)*(isLast?15:8),(Math.random()-.5)*(isLast?15:8),(Math.random()-.5)*(isLast?15:8));
    let lp=p.object3D.position.clone(); const iv=setInterval(()=>{lp.add(vel);p.object3D.position.copy(lp);},16);
    setTimeout(()=>{p.remove();clearInterval(iv);},isLast?6000:4000);
  }
  const sw=document.createElement('a-ring'); sw.setAttribute('position',pos); sw.setAttribute('radius-inner','5'); sw.setAttribute('radius-outer','10'); sw.setAttribute('color','#ffff00'); sw.setAttribute('emissive','#ffff00'); sw.setAttribute('emissive-intensity','8'); sceneEl.appendChild(sw);
  let r=5; const ex=setInterval(()=>{r+=isLast?8:4;sw.setAttribute('radius-inner',r);sw.setAttribute('radius-outer',r+5);sw.setAttribute('opacity',1-r/(isLast?200:100));},16);
  setTimeout(()=>{sw.remove();clearInterval(ex);},isLast?5000:2500);
  if(isLast) setTimeout(()=>triggerFinalExplosion(),2000);
}
function triggerScreenShake() { screenShakeEl.classList.add('shake'); setTimeout(()=>screenShakeEl.classList.remove('shake'),500); }

/* ── EXPLOSIÓN FINAL → finale.html ──────────────────── */
function triggerFinalExplosion() {
  gameActive=false;
  const bPos=bossObj.position.clone();
  for(let i=0;i<800;i++){
    const p=document.createElement('a-sphere'); p.setAttribute('radius',Math.random()*4+1);
    const cols=['#ff0044','#ff6600','#ffff00','#00ffff','#ffffff']; p.setAttribute('color',cols[Math.floor(Math.random()*5)]); p.setAttribute('emissive',p.getAttribute('color')); p.setAttribute('emissive-intensity','8'); p.setAttribute('position',bPos); sceneEl.appendChild(p);
    const vel=new THREE.Vector3((Math.random()-.5)*25,(Math.random()-.5)*25+10,(Math.random()-.5)*25);
    let lp=p.object3D.position.clone(); const iv=setInterval(()=>{lp.add(vel);p.object3D.position.copy(lp);},16);
    setTimeout(()=>{p.remove();clearInterval(iv);},5000);
  }
  setTimeout(()=>{finalBeamEl.style.opacity='1';finalBeamEl.style.transition='height 2s ease-out, opacity 0.5s';finalBeamEl.style.height='100%';},500);
  setTimeout(()=>{skyOverlayEl.style.background='linear-gradient(to bottom, #87ceeb, #ffffff)';skyOverlayEl.style.opacity='1';},3000);
  setTimeout(()=>{ window.location.href='finale.html'; },5000);
  bossEl.setAttribute('visible','false');
}

/* ── DAÑO ────────────────────────────────────────────── */
function damageBoss(amount) {
  bossHealth-=amount; if(bossHealth<0)bossHealth=0;
  document.getElementById('boss-health-fill').style.width=`${bossHealth}%`;
  if(bossHealth<=0) victory();
}
function damagePlayer(amount) {
  if(isInvincible) return;
  playerHealth-=amount; if(playerHealth<0)playerHealth=0;
  document.getElementById('player-health-fill').style.width=`${playerHealth}%`;
  const ov=document.getElementById('damage-overlay'); ov.style.opacity='0.8'; setTimeout(()=>ov.style.opacity='0',200);
  if(playerHealth<=0) gameOver();
}

/* ── VICTORIA — guarda trophy y va a finale.html ─────── */
function victory() {
  gameActive = false;

  // Guardar trophy en sessionStorage para hotbar
  const inv = JSON.parse(sessionStorage.getItem("hotbar_v3") || "[]");
  if (!inv.find(i => i.sceneId === "pickup-trophy")) {
    inv.push({
      sceneId: "pickup-trophy",
      src:     "assets/absolute_supremacy_trophy.glb",
      label:   "Trophy"
    });
    sessionStorage.setItem("hotbar_v3", JSON.stringify(inv));
  }
  if (window.buildHotbar) buildHotbar();

  document.getElementById('victory-screen').style.display = 'flex';
  setTimeout(() => { window.location.href = 'finale.html'; }, 5000);
}

function gameOver() {
  gameActive=false;
  document.getElementById('gameover-screen').style.display='flex';
  setTimeout(()=>{ window.location.href='lobby.html'; },4000);
}

/* ── GAME LOOP ───────────────────────────────────────── */
let frameCount=0;
function gameLoop() {
  frameCount++;
  if(gameActive){
    updatePlayer(); updateBoss(); updateProjectiles(); updateOrbs();
    if(frameCount%10===0){updateTerrain();updateRadar();}
  }
  requestAnimationFrame(gameLoop);
}

window.addEventListener('load',()=>{
  initAudio(); spawnOrbs(); activateInvincibility(); gameLoop(); updateTerrain();
});
</script>
</body>
